<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Profile | SSV HOTEL</title>

<link rel="stylesheet" href="CSS/admin-profile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- ===========================
NAVBAR
=========================== -->

<nav class="navbar">

<div class="logo">

🏨 SSV HOTEL ADMIN

</div>

<ul>

<li><a href="admin-dashboard.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a></li>

<li><a href="admin-settings.html">
<i class="fa-solid fa-gear"></i>
Settings
</a></li>

<li><a class="active" href="#">
<i class="fa-solid fa-user"></i>
Profile
</a></li>

<li><a href="admin-login.html">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a></li>

</ul>

</nav>

<!-- ===========================
PROFILE
=========================== -->

<div class="profile-container">

<div class="profile-card">

<h1>

<i class="fa-solid fa-user-shield"></i>

Admin Profile

</h1>

<!-- PHOTO -->

<div class="photo-section">

<img
id="profilePreview"
src="images/profile.png"
alt="Profile">

<input
type="file"
id="profileImage"
accept="image/*">

</div>

<!-- ===========================
PERSONAL INFORMATION
=========================== -->

<h2>

<i class="fa-solid fa-id-card"></i>

Personal Information

</h2>

<div class="grid">

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="adminName"
placeholder="Enter Full Name">

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="adminEmail"
placeholder="Enter Email">

</div>

<div class="form-group">

<label>Phone Number</label>

<input
type="text"
id="adminPhone"
placeholder="Enter Phone Number">

</div>

<div class="form-group">

<label>Role</label>

<input
type="text"
id="adminRole"
value="Administrator"
readonly>

</div>

<div class="form-group full-width">

<label>Hotel Name</label>

<input
type="text"
id="hotelName"
value="SSV HOTEL"
readonly>

</div>

</div>

<!-- ===========================
ACCOUNT DETAILS
=========================== -->

<h2>

<i class="fa-solid fa-calendar"></i>

Account Details

</h2>

<div class="grid">

<div class="form-group">

<label>Joined Date</label>

<input
type="text"
id="joinedDate"
value="01-Jan-2027"
readonly>

</div>

<div class="form-group">

<label>Last Login</label>

<input
type="text"
id="lastLogin"
readonly>

</div>

<div class="form-group full-width">

<label>Status</label>

<input
type="text"
value="🟢 Active"
readonly>

</div>

</div>

<!-- ===========================
CHANGE PASSWORD
=========================== -->

<h2>

<i class="fa-solid fa-lock"></i>

Change Password

</h2>

<div class="grid">

<div class="form-group">

<label>Current Password</label>

<input
type="password"
id="currentPassword">

</div>

<div class="form-group">

<label>New Password</label>

<input
type="password"
id="newPassword">

</div>

<div class="form-group full-width">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword">

</div>

</div>

<div class="show-password">

<input
type="checkbox"
id="showPassword">

<label for="showPassword">

Show Password

</label>

</div>

<div class="button-group">

<button id="saveProfile">

<i class="fa-solid fa-floppy-disk"></i>

Save Changes

</button>

<button
type="button"
id="resetProfile">

<i class="fa-solid fa-rotate"></i>

Reset

</button>

</div>

</div>

</div>

<script src="js/admin-profile.js"></script>

</body>

</html>
